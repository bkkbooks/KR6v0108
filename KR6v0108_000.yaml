front:
  text: 御注金剛般若經作者唐李隆基整理者衣川賢次題解御注金剛經又名御注金剛般若波羅蜜經佛經注疏一卷唐玄宗李隆基著唐朝是我國佛教宗派佛教理論極為興盛的時期金剛經作為大乘佛教的重要經典對中國佛教及諸多宗派有著廣泛的影響在民衆中保持著強大的吸引力唐玄宗李隆基是我國歷代帝王中在宗教政策方面表現得比較成熟的人物雖然就個人而言他比較傾向於信仰道教但為了國家的長治久安他一方面利用國家機器的力量對儒釋道三家進行控制一方面平等對待儒釋道推行三教合一為了表現平等對待儒釋道這一姿態他分別為三教各注釋一種經典為儒注釋孝經為佛注釋金剛經為道注釋道德經這也就是御注金剛經産生的背景李隆基的御注金剛經逐句解釋金剛經經文文字精煉簡要與正統的佛教徒所著注疏不同李隆基在這部御注金剛經中對經文不僅有解釋而且有質疑反映了李隆基本人對金剛經的學習與理解對我們研究唐代非佛教徒的佛教知識水平以及他們對佛教的理解與觀感提供了重要的資料根據房山石經本記載該經於開元二十三年六月三日由都釋門威儀僧思有表請至九月十五日經出合城具法儀於通洛門奉迎其日表賀便請頒示天下寫本入藏宣付史官當時的名僧道氳特意為此御注金剛經撰寫復疏名為御注金剛波羅蜜經宣演僧人為了學習御注金剛經及其宣演還撰寫了一批相關著作這些著作至今在敦煌遺書中仍有保存御注金剛經雖然在當時挾帝王之力被收入大藏甚為流行但其後便亡佚無存幸而在房山石經及敦煌遺書中尚有保存現存御注金剛經的情況如下一房山石經本即在北京房山雲居寺藏經洞第八洞華嚴洞中保存下來四塊石經名為金剛般若波羅蜜經御注并序該石碑為唐天寶元年八月十五日立四石八面面行行至字不等注文雙行依據吳夢麟先生報告經注刻石雖有少部分殘泐但絶大部分完好據統計現在尚存經注文一萬三十三字其中經文四千一百四十字占原經文五千一百多字之百分之八十左右注文五千八百九十三字包括序和尾部題記年吳夢麟先生曾發表校録本房山石經本唐玄宗御注金剛經整理記年訂正後收録於房山石經研究二失傳已久的唐玄宗御注金剛經被初次公布於世功不可沒年房山石經題記匯編收録了房山石經本御注金剛經的題記據氣賀澤保規編房山石經山洞窟所藏隋唐石經一覽表房山雲居寺石經山第洞中另有一種金剛般若波羅蜜經御注並序亦為一卷但據中國佛學院副院長姚長壽先生的來信第洞所藏的實為鳩摩羅什譯金剛經序號的題記姚長壽在信中肯定地説御注金剛經的本子房山石經中現存的看來只有原藏於第洞中的一種故房山石經山洞窟所藏隋唐石經一覽表所述有誤特此説明筆者於年承蒙方廣錩姚長壽兩位先生的支持與幫助在北京法源寺得以就房山石經本御注金剛經的拓片進行調查該拓片的圖版目前已經出版可參見中國佛教協會編房山石經隋唐刻經部分第三册華夏出版社年二敦煌寫卷本即現藏於英國圖書館的敦煌遺書斯號該遺書首尾均殘中間存行前行下半殘缺從文字量計算大約保存房山石經本的其書寫年代約為盛唐時期世紀該遺書早期曾為矢吹慶輝發現但未能考訂出即為唐玄宗御注金剛經故擬名作金剛般若經挾注後校録收於大正新修大藏經第册編號為第號該遺書圖版可見黃永武編敦煌寶藏第册新文豐出版公司年三吐魯番出土殘片至今為止共發現片一現藏於德國國家圖書館編號為第號存行前行上殘後行下殘書寫年代不明圖版參見梯婁編漢文佛教文獻殘卷目録第一册附録圖版柏林年二現藏於德國國家圖書館編號為第號存行圖版見花園大學文學部研究紀要第號年三現藏於日本京都國立博物館殘片粘貼在題為六朝以來漢番殘字册的册頁中存行上殘書寫年代約為世紀以上三種御注金剛經房山石經本首尾完整但每石中間部分均有殘泐敦煌遺書本首尾均缺但中間文字清晰悅目誤洐脫倒極少吐魯番本雖為殘片但所存開頭部分可以據補以上二本的殘缺此次筆者在吳夢麟先生録校的基礎上重新以房山石經本為底本以敦煌遺書本吐魯番本為參校本進行校録整理結果復原了房山石經本所缺的經文字注文字校録整理時還參校了大正藏第號道氤御注金剛般若波羅蜜經宣演敦煌遺書存號趙城金藏存卷德國吐魯番殘片有兩號和慧光大乘開心顯性頓悟真宗論孰煌遺書存兩號中的一些御注金剛經的引文據房山石經本御注金剛經第一面底部的題記該本由一位叫李大師的出家人合家捐刻的今查房山石經本御注金剛經所引金剛經正文有若干錯漏應為李大師所雇的民間刻工疏失所致本録校本依據大正藏本金剛經及日本大谷大學所藏敦煌遺書咸亨四年長安宮廷寫經金剛經大谷餘乙號對金剛經正文進行校勘整理至於御注金剛經的背景及其特色對後世的影響跟禪宗的關係等問題整理者另有專論已於二十一世紀敦煌學國際學術研討會上發表請參閲整理本的底校本如下底本房山石經本拓片筆者所用為中國佛教協會藏原拓片校本甲本英國圖書館藏敦煌寫本斯號乙本德國國家圖書館藏吐魯番出土斷片號丙本德國國家圖書館藏吐魯番出土斷片號丁本日本京都國立博物館藏六朝以來漢番殘字册戊本吳夢麟房山石經本唐玄宗注金剛經整理記載吳立民主編房山石經研究二中國佛教文化出版有限公司香港年己本麥谷邦夫唐玄宗金剛般若波羅蜜經注本文載唐玄宗金剛般若波羅蜜經注索引京都大學人文科學研究所附屬漢字情報研究中心編東方學資料叢刊第册年至於參校的大正藏第號御注金剛般若波羅蜜經宣演大乘開心顯性頓悟真宗論等一概隨文説明録文
