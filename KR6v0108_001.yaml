body:
  text: 述作者明聖之能事也朕誠寡薄豈宜空為好古竊比前徒自為矜飾蓋欲弘獎風教爾昔歲述孝經以為百行之首故深覃要旨冀闡微言不唯先王至德實謂君子務本近又讚道德伏知聖祖垂教著經稟訓況道家使人精神專一動合無為凡有以理天下之二經故不可闕也今之此注則順乎來請夫衆竅互作鼓之者風也柤梨相殊可口者味也苟在將助我者何間然乎且聖人設教以盡理因言以成教悟教則言可忘得理而教可遺同乎大通者雖分門而一致攻乎異端者將易性於多方諒在乎不著人我不住福德忘心於三伐閉境於六塵以音聲求如夢幻法故發菩提者趣於中道習無漏者名為入流將會如如故須遣遣然三同證皆衆妙門可不美歟可不美歟文關事迹理涉名數注中粗舉而未盡明及經中梵音應須翻譯者并詳諸義訣云金剛般若波羅蜜經金剛真寶能碎堅積般若正智能破煩惱無住無取證波羅而捨筏即色即空契菩提於中道如是降伏可以稱常如是我聞一時佛在舍衛國祇樹給孤獨園如是勝法我聞此一會之時在舍衛國祇陀施樹須達買園莊嚴道場如是說法與大比丘衆千二百五十人俱上果乞士其數若斯隨佛經行得預今會爾時世尊食時著衣持鉢入舍衛大城乞食齊食之時將行求食是以具服入城持鉢而乞於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐徒跣而行故洗足將欲說法故敷座時長老須菩提在大衆中即從座起偏袒右肩右膝箸地合掌恭敬而白佛言解空明希有世尊如來善護念諸菩薩善付囑諸菩薩護持念恤成熟根性付託囑授宣通法音功力如斯實為希有世尊善男子善女人發阿耨多羅三藐三菩提心應云何住云何降伏其心前歎護之心咨佛言善哉善哉須菩提如汝所說如來善護念諸菩薩善付囑諸菩薩汝今諦聽當為汝說善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心哉光標唯然世尊願樂欲聞受敕諦聽故云唯然深好法音故云願樂佛告須菩提諸菩薩摩訶薩應如是降伏其心所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想若非無想我皆令入無餘涅槃而滅度之卵胎濕化依四緣生有色無色依有無生有想無想依境界生若非有想若非無想依粗細觀生如是衆緣皆非中道故我以般若正觀皆令悟入圓寂常樂則滅盡苦趣超度愛流夫以般若智破煩惱障盡般若智存斯有餘也若能遣之又遣空法亦空一切皆如離涅槃相湛常圓寂故曰無餘如是滅度無量無數無邊衆生實無衆生得滅度者衆生性本本來寂滅妄心取相開此萬緣今但滅妄心令照性本爾豈復別有衆生受滅度耶何以故若菩薩有我相人相衆生相壽者相即非菩薩般若正智無顛倒心計有我人即非菩薩未悟求悟故云令入入則無餘誰云滅度復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施此以法空答前住義諸法無相不應取著故菩薩於法無所住心六度檢行六塵攝境二法空須三施自忘則不捨之檀於群有矣須菩提菩薩應如是布施不住於相應如前義離六塵忘二相也何以故若菩薩不住相布施其福德不可思量菩提之因無住之施福平等有如虛空故叵量也須菩提於意云何佛言如是之義於汝意謂以為云何東方虛空可思量不不也世尊須菩提南西北方四維上下虛空可思量不不也世尊無住之施其福甚多借喻虛空將以推校須菩提菩薩無住相布施福德亦復如是不可思量福施無相是名無住無住之施福如虛空虛空既不可量則無住之施亦不可思量也須菩提但應如所教住所教即上不住相等教也前問應云何住答云於法住即明菩薩住無所住但依無所住即是如所教住也須菩提於意云何可以身相見如來不前明所住啓發法辨證因不也世尊不可以身相得見如來何以故如來所說身相即非身相身相生滅是衆生見法身疑寂本無去來衆生見者悉皆虛妄所說身相皆為衆生妄見既除法身非相佛告須菩提凡所有相皆是虛妄若見諸相非相即見如來如來法身無生滅相見有生滅從虛妄生若能悟法空性等無生滅凡見諸相皆非真實則圓寂法身離相而見矣須菩提白佛言世尊頗有衆生得聞如是言說章句生實信不凡夫心信因取相生般若深宗極無恐聞是理無處寄心將釋此疑故佛告須菩提莫作是說般若深宗為最上乘者說聞說即悟不應不信故莫作此問也如來滅後後五百歲有持戒修福者於此章句能生信心以此為實後五百歲像法之中具戒福者於此能信況今正法流通而無信耶當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根能信深法必藉宿因故知是能信之人所種善根非正一佛二佛也聞是章句乃至一念生淨信者不見信相是名淨信持福能生信心惠解能無見相須菩提如來悉知悉見是諸衆生得如是無量福德般若智具佛法眼故能悉見知見是淨信衆生得如是無量福德何以故是諸衆生無復我相人相衆生相壽者相無法相亦無非法相無我相者以達人空無法相者以達法空無非法相者以達空空一念淨信三空頓解若計諸相則不名淨信能信般若知達法空故知是衆生無復諸相也何以故是諸衆生若心取相則為著我人衆生壽者何以故此諸衆生應不取相者若心起念取相即我人計有我人非達般若則不能生淨信若取法相即著我人衆生壽者若取諸法計五聚蔭即於此身還生我相何以故若取非法相即著我人衆生壽者是故不應取法不應取非法不取法相以空破有若滯空不空還著有相故不應法以是義故如來常說汝等比丘知我說法如筏喻者法尚應捨何況非法以是不取於相故如來常說說無所說豈取相耶故汝等比丘知我所說法本破於有若知有不有遂悟於空無取是名達解夫筏以投岸筌以取魚得魚忘筌到岸捨筏故大聖說空以破諸見諸見既除空法亦盡況非空法其可乎須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所說法耶前令捨法遣彼兩偏則佛於菩提如何獨得而為人說法耶須菩提言如我解佛所說義無有定法名阿耨多羅三藐三菩提亦無有定法如來可說無上正道寂然無體無相空經悟佛得菩提已悟則無佛何以故如來所說法皆不可取不可說非法非非法如來所說妙法本為衆生離相故不可取離言故不可說而妙契圓證則未嘗不取未嘗不說非法則不有非非則不無不有不無離諸言相故無定法名耨多羅所以者何所以佛嘗說法而無定法可說者何一切賢聖皆以無為法而有差別無為法中本無差別三乘賢聖根識不同一音演說淺深隨分未悟則量病授藥故常說法已悟則藥病皆除無法可說須菩提於意云何若人滿三千大千世界七寶以用布施將欲校量持經之功故舉若人財寶之施以明章句理實非虛是人所得福德寧為多不須菩提言甚多世尊七寶珍異三千皆滿無性之福施廣增多何以故是福德即非福德性是故如來說福德多所以施廣而福多由非福德性故若是福德性則不應寶多而福多只由無性之福假外緣是故如來說福德若復有人於此經中受持乃至四句偈等為他人說其福勝彼財施之福非福德性福雖因施不趣菩提持經之功句偈雖少能令衆生除煩惱障是真福德故勝於彼何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出般若正智圓照無礙無上正道因是發明諸佛始則自修終以化物利濟弘遠何莫由斯須菩提所謂佛法者即非佛法法無自性證則彌同因教悟空故稱佛法空由教立悟不滯空直論無法可非豈但即非佛法須菩提於意云何須陀洹能作是念我得須陀洹果不修習無漏證無漏果悟無所得名須陀洹借小乘之無我明般若之忘相須菩提言不也世尊是人不起得果之念何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹習無漏果則名入道流不取果相故無流可入豈以忘相而無道流可入復於有我而入聲色六塵耶須菩提於意云何斯陀含能作是念我得斯陀含果不斷欲界思惟得人我空相證果之時有斯念不須菩提言不也世尊是人不起得果之念何以故斯陀含名一往來而實無往來是名斯陀含盡天人趣獲往來生一斯往來則明所得果不取果相故實無往來若見一往來果是生我慢則非斯陀含也須菩提於意云何阿那含能作是念我得阿那含果不斷欲界思盡更不復來證果之時有斯念不須菩提言不也世尊是人不起得果之念何以故阿那含名為不來而實無來是故名阿那含達無人我不復還來故名不來人法二空無取住相故實無來即阿那含而具斯義須菩提於意云何阿羅漢能作是念我得阿羅漢道不修習智慧斷除煩惱證果之時有是念不須菩提言不也世尊是人不起得果之念何以故實無有法名阿羅漢以斷煩惱名阿羅漢煩惱性空斷無所斷悟無所斷豈復別有阿羅漢耶世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者若取果相即計有我於我不忘諸相咸著相受報衆惱皆生取相受生豈名羅漢世尊佛說我得無諍三昧人中最為第一是第一離欲阿羅漢善吉樂阿蘭行得三昧定深入觀不相違諍凡諸人中最為超勝故云第一三界煩惱逐境受纍是名為欲如是悉離故亦云第一我不作是念我是離欲阿羅漢我於爾時曾不起念云有欲可離有果可得世尊我若作是念我得阿羅漢道世尊則不說須菩提是樂阿蘭那行者我若起念計有得果獲離欲道即成著我違無諍行則世尊不應說我是樂阿蘭那以須菩提實無所行而名須菩提是樂阿蘭那行於行無行是了空相佛告須菩提於意云何如來昔在然燈佛所於法有所得不將明菩薩亦悟於空故卻問我昔為菩薩於然燈佛所受記菩提當爾之時見有菩提法可得不世尊如來昔在然燈佛所於法實無所得悟法性空得無生忍勤行般若勝果則曰菩提深入正觀諸佛由之授記須菩提於意云何菩薩莊嚴佛土不菩薩修持淨土行業見有淨土可莊嚴不不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴萬行不常畢竟空寂示有修習假名莊嚴國土本空無莊嚴相能了無相即以是莊嚴故是名莊嚴是故須菩提菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心是以修習者故不取莊嚴之相應如是生畢竟空寂心是心清淨故不住於色及聲香等若於是法而生心者即非清淨心所證之果非畢竟果故不應如是應無所住而生其心知色相空心無所住故於無所住生清淨心雖假生心之名而無住心之相無住正觀惠照湛然是則以不住法住般若中須菩提譬如有人身如須彌山王於意云何是身為大不身相空假如須彌山雖有大名皆非實體不應起心取相以為大身破前取色之心故起大身之問須菩提言甚大世尊何以故佛說非身是名大身觀乎泰山木石同壇和合衆材假名為大本無自性何定大耶所以佛說非身是名大身不應生心以取身相如色聲等不可取也須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不以一恆河沙而數於河河中之沙亦復如彼如此之數為多不耶須菩提言甚多世尊但諸恆河尚多無數何況其沙以沙數河河尚無數況復於沙實為甚多須菩提我今實言告汝若善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不須菩提言甚多世尊無性之福施廣福多沙河大千其數無量故知所得福至於甚多佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人說而此福德勝前福德財施雖多無益惠解章句雖少必趣菩提以此校量故無等級復次須菩提隨說是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟更標勝義以勸修行佛滅度後有塔廟遺像若復有人隨說是經兼持句偈則天人等輩皆當供養如彼塔廟也何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法般若正智能趣菩提若人受持必生信解即知是人能成就無上菩提故云最上第一希有之法若是經典所在之處則為有佛若尊重弟子此云經典所在之處則上成就希有之人勝法在人則為有佛少有差降猶如尊重弟子爾時須菩提白佛言世尊當何名此經我等云何奉持前來所明皆無定法法雖無定教必有宗欲宣是義故起斯問佛告須菩提此經名為金剛般若波羅蜜以是名字汝當奉持般若正智喻如金剛破煩惱障了出中道渡貪愛流超到彼岸故以是名字無量勝義汝當循名責實依是奉持所以者何須菩提佛說般若波羅蜜則非般若波羅蜜說般若法差煩惱病煩惱是妄由執見生妄病既除真法應捨若執持般若不解空義惟此般若亦成煩惱故佛說般若波羅蜜則無定法名般若也須菩提於意云何如來有所說法不前云則非般若未明所以則非故卻質此疑以通前義須菩提白佛言世尊如來無所說於言無滯終身言而未嘗言於法無取終身說而未嘗說知我所說則法尚應捨昧於斯道則言者不知故於此二夜我都無所說須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊前明理教無取此明境界亦空須菩提諸微塵如來說非微塵是名微塵如來說世界非世界是名世界散彼世界以為微塵於彼塵中本無自性積彼微塵以成世界於此世界豈有性耶本無自性故非微塵為是假緣是名世界須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來法本無言因言立教身本非相因相見身因言立教既不可執言而求理因相見身故不可取相而見佛何以故如來說三十二相即是非相是名三十二相假立身相以表法王諸法本空身相非有能知諸相非相色相皆空即此妙身是名三十二相須菩提若善男子善女人以恆河沙等身命布施若復有人於此經中乃至受持四句偈等為他人說其福甚多多以身命布施勝報尚有輪回少能受持是經纍盡自無生滅校量其福持經甚多爾時須菩提聞說是經深解義趣涕淚悲泣而白佛言希有世尊佛說如是甚深經典我從昔來所得惠眼未曾得聞如是之經昔得惠眼於有見空今聞是經於空亦遣是名中道故未曾聞善吉解空久得深趣將欲起教以示未來故涕淚悲泣歎其希有世尊若復有人得聞是經信心清淨則生實相當知是人成就第一希有德功德信不著相是清淨心得清淨心則能照般若真實之相得茲實相必趣菩提菩提果成即名第一希有功德世尊是實相者則是非相是故如來說名實相以般若智趣真實相夫實相者豈有相哉則妙色法身真空無礙非假有相離空無相即此之相非實相耶也世尊我今得聞如是經典信解受持不足為難親承受記久悟空法今復聞說信解非難若當來世後五百歲其有衆生得聞是經信解受持是人則為第一希有像法之中去聖逾遠但聞遺教便解奉持則知是人了甚深義無出其右故云第一何以故此人無我相人相衆生相壽者相何以故此人得名第一希有者為不著如是等相故能信解是經得為第一所以者何我相即是非相人相衆生相壽者相即是非相於我無相妄計有我能了我相非相即不著人衆生壽者矣何以故離一切諸相則名諸佛何以故此人無我則為希有者能離諸相即是菩提故為希有佛告須菩提如是如是印可其說若復有人得聞是經不驚不怖不畏當知是人甚為希有於無為法而有差別如是賢聖優劣不同中小二乘係執因果福德報應聞是深義必當驚怖能不怖畏已是希有況能信解而受持耶何以故須菩提如來說第一波羅蜜非第一波羅蜜是名第一波羅蜜諸法莫二故云第一到彼岸者為對此流此流已盡彼岸何有是知諸法但示假名纍盡名去故非第一於斯了義能入深門故是名第一波羅蜜須菩提忍辱波羅蜜如來說非忍辱波羅蜜忍辱者明無我也人辱我忍以為勝行本無人我誰辱忍耶何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相無我無人誰忍誰辱何以故我於往昔節節支解時若有我相人相衆生相壽者相應生瞋恨前舉割截無我以明無忍今舉不生瞋恨復明無我小乘計執我相則多起貪瞋今隳裂支體不生瞋恨者則復何外相預其間乎知無我矣須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相了無我相非止此生當於爾時已達斯趣是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心從前已來明無相降住之義今明離相無性乃是菩薩發心況於菩提且無定法發心取相不亦難乎不應住色生心不應住聲香味觸法生心菩提無定相可取況六塵乎是假合相不應生心住於此也應生無所住心以有所住即著諸相故勸於無所住而生其心斯對辨也夫無所住豈生心哉若於無所住而生心是未免於有所住也但於一切法無所住以此為生心爾非謂別生無所住心也故下文云若心有住則為非住此又遣無所住也言若心於無所住有住則為非住無所住也是故佛說菩薩心不應住色布施引前佛說以證今義須菩提菩薩為利益一切衆生應如是布施菩薩住相布施未名懸解幕生欲求利益不亦難乎故菩薩用心應如是不住相布施也如來說一切諸相即是非相如來所說福德因果報應等一切諸相皆因衆生妄心起念爾於法性本空是故非相又說一切衆生則非衆生若住相布施則見有施者受者今不住相則無我相人相生性空故即非衆生須菩提如來是真語者實語者如語者不誑語者不異語者夫無我人相及無住布施此甚深般若中道義門恐二乘之人不生信實故因五語以示真如善吉當知不誑不異須菩提如來所得法無實無虛有虛有實約教以示人無實無虛兩忘而自化故如來說法寄實以遣虛虛法既忘實法亦盡故於是法無實無虛須菩提若菩薩心住於法而行布施如人入暗則無所見存受施法計報應果則不了般若無相之義是無明慧故如入暗無所見也若菩薩心不住法而行布施如人有目日光明照見種種色太陽朝升有目者見諸色象般若圓就無住者了諸法空為利衆生故行不捨之檀不住諸相則未嘗生心布施也須菩提當來之世若有善男子善女人能於此經受持讀誦則為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德印可勸修如上深義須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施分日三時以內財施如是億劫計福德多若復有人聞此經典信心不逆其福勝彼聞前不住之施即順無相之心唯此信心可名達解則達解之福勝彼施身何況書寫受持讀誦為人解脫信心不逆其福已多況能書誦而為人解說弘益之利其可量乎須菩提以要言之此經有不可思議不可稱量無邊功德以要大也無相之福與真如等故非思議得其淺深稱量得其輕重如是功德豈有邊際耶如來為發大乘者說為發最上乘者說上品利根了真如相是名大乘得無生觀深入祕藏加最上之號非如來聊簡二乘而不為說但二乘之人未能解了耳若有人能受持讀誦廣為人說如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德大乘最上之人能以般若自利利他者佛心悉知佛眼悉見皆知是人成就無相勝義是法離一切相無斷常邊故其功德不可稱量思議知也如是人等則為荷擔如來阿耨多羅三藐三菩提是人深達般若廣為人說即是荷負正法擔運勝義令諸衆生成就功德何以故須菩提若樂小法者著我見人見衆生見壽者見則於此經不能聽受讀誦為他人說小乘著相於此深義不能信奉也須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處則為是塔皆應恭敬作禮圍繞以諸華香而散其處此經示人諸佛無上正遍知道塔者諸佛遺像之所在也了義當趣菩提聞經即如見佛故是經所在之處同於塔廟遺像故天人修羅所應供養作禮圍繞示尊敬之意花香散灑表淨信之心非謂求悟於香花解空於罄折也復次須菩提若善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提以此敦勸持經之人爾夫業若先定應墮惡道即是鈍根聞必驚怖安能信奉而讀誦此經耶若後五百歲聞是章句能生信心者此人已於千萬佛所種諸善根復若為人輕賤乎況此經佛為大乘最上乘者說皆真實不誑不應苟勸愚人崇信而發菩提取相之言將如來別有深意乎為譯經之人失其旨也須菩提我念過去無量阿僧祇劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者明我今日所證菩提亦由昔來功德所致也若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及末世人訛勝心難發故於此時能持經者功德甚多以我昔供養校量百分不及其一乃至千萬億分功德不如須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具說者或有人聞心則狂亂狐疑不信報施之福人皆取相章句功德所趣無為菩提勝因因是而悟悟則獲證卒難詳說小乘執滯謂無是理是以狂亂狐疑不能實信須菩提當知是經義不可思議果報亦不可思議深奧祕藏歸趣菩提以供養百千萬佛猶不如持經功德故無相勝義非思議及至於果報亦復如之爾時須菩提白佛言世尊若善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心首章此問以明發心降住之義今恐菩薩存我發心能作如是降住則障解空不住之道故於此重破實無菩薩發心來問雖同往明則異佛告須菩提善男子善女人發阿耨多羅三藐三菩提者當生如是心我應滅度一切衆生衆因緣生本非有法妄心執著起衆生相今悟性空則衆緣自滅菩提中道應發是心滅度一切衆生已而無有一衆生實滅度者但滅妄想爾若計滅此妄無離妄心今有妄既滅無空亦捨反照於性不住於常及吾無身誰受滅度何以故若菩薩有我相人相衆生相壽者相即非菩薩離彼四相是名無我於我無矣誰當滅耶所以者何須菩提實無有法發阿耨多羅三藐三菩提心者菩提無定法法空也實無發心者生空也法空無所住生空無降伏正觀如此是名菩薩豈復別有一我云度衆生哉須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不若前云無法發菩提心則不應於然燈佛所受菩提記欲斷此疑故卻問善吉云於汝意以為云何如來於昔時有方法得菩提不不也世尊如我解佛所說義佛於然燈佛所無有法得阿耨多羅三藐三菩提推解於佛以明勝義以無所得故受菩提記豈有發心者而得菩提耶欲明不發得法心乃真發心耳佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提許善吉之言是成前問之無得須菩提若有法如來得阿耨多羅三藐三菩提然燈佛則不與我受記汝於來世當得作佛號釋迦牟尼於菩提中為有法可得發如是心則不證斯果定光不應受記以實無有法得阿耨多羅三藐三菩提是故然燈佛與我受記作是言汝於來世當得作佛號釋迦牟尼以般若智了諸法如悟生法空離斷常見豈別有法得菩提耶以是無得之故故然燈佛知我修證與我受記耳何以故如來者諸法如義如者法性也是性清淨無有定相遂通於感勿得皆如既如陰如陽亦不暾不昧悟斯如義來成佛果了此空相寂然無體豈於有法而得是耶若有人言如來得阿耨多羅三藐三菩提若有此言即非如義須菩提實無有法佛得阿耨多羅三藐三菩提約諸法如義則如來必不於有得法中得菩提也須菩提如來所得阿耨多羅三藐三菩提於是中無實無虛此又雙遣也前云以有法得者虛妄也以無法證者真實也此乃寄無以遣有假實以明虛虛有之妄既除實無之法亦盡但約邊以趣中道爾於是中豈有虛實耶是故如來說一切法皆是佛法一切法中皆有中義能趣中道即會於如故諸法得中皆佛法也須菩提所言一切法者即非一切法是故名一切法因緣生法本無自性無性非有故即非一切法也為因緣故有假名生假名非無是故名一切法也須菩提譬如人身長大一切法假因緣生如人身長大亦資百骸九竅以賅而存耳須菩提言世尊如來說人身長大則為非大身是名大身人身長大假合衆緣分分不同則為非大而身相具足是名大身則知不離假合之身而有大身不離因緣生法而有佛法煩惱之外豈復別有涅槃耶須菩提菩薩亦如是勸菩薩亦當作如是解行於中道若作是言我當滅度無量衆生則不名菩薩以計有衆生故則著於相不趣中道故不得名道心衆生何以故須菩提實無有法名為菩薩於五聚蔭中實無有一法名為菩薩也是故佛說一切法無我無人無衆生無壽者以結前無有法名菩薩故不著此四相無是等相則不應別有菩薩度衆生也須菩提若菩薩作是言我當莊嚴佛土是不名菩薩於內無相不應言我度衆生於外無相不應莊嚴佛土何以故如來說莊嚴佛土者即非莊嚴是名莊嚴無相莊嚴佛土即非有相莊嚴之法能了無相是名莊嚴故菩薩不應計我能莊嚴佛土也須菩提若菩薩通達無我法者如來說名真是菩薩於人無我於法無我忘於四相不取六塵能如此者則不應計有衆生可滅度有淨土可莊嚴通達若斯是真道心衆生矣須菩提於意云何如來有肉眼不如是世尊如來有肉眼色相同衆生即肉為眼故云肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼於眼淨根普照一切故云天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼依定發慧了一切相故云慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼了一切法於法無滯故云法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼總彼衆相成我妙身圓對無礙故云佛眼是五眼者約事為名以所觀之境因能觀之用如彼摸象生異號於我佛身故為同體若別為階級次第或云修證不同此則以色見如來非謂通於無相也須菩提於意云何如恆河中所有沙佛說是沙不如是世尊如來說是沙如來說法常以河沙為喻須菩提於意云何如一恆河中所有沙有如是等恆河是諸恆河所有沙數佛世界如是寧為多不甚多世尊一河之沙數等諸河諸河之沙有如世界如此世界實為甚多佛告須菩提爾所國土中所有衆生若干種心如來悉知世界已多是中衆生心心攀緣數不能舉如是心等如來悉知何以故如來說諸心皆為非心是名為心何以故如來悉知謂此諸心皆由妄起與物相刃逐境交馳如是等心是生知見妄法非有畢竟皆空唯淨信心如所教住證達本末是名為心所以者何須菩提過去心不可得見在心不可得未來心不可得以三世法求生知心是心無常求不可得前云非心名心借常心以破妄此云心不可得又遣破妄之常然不將不迎應而無主萬境咸入我用不疲千相取容其心皆給不唯般若之蘊乎須菩提於意云何若人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多施寶求福以果酬因故知福德甚多須菩提若福德有實如來不說得福德多以福德無故如來說得福德多寶施求福非福德性未絶因地故說果多七寶既盡假名所獲亦非有實非有實故故不取相是以如來應緣而說云得福多若行深般若歸趣中道罪既不至福亦不來心如教住法尚應捨有何福德於其間哉須菩提於意云何佛可以具足色身見不不也世尊如來不應以具足色身見色為有分身假緣成凡是色身皆非妙相故不應以此見如來也何以故如來說具足色身即非具足色身是名是具足色身具足色身分分假合故即非具足色身離假合身別無真身故是名具足色身當試論之夫無色之色見一切色非身之身見一切身若以色色空縱妙身而有我以空空色雖色身而見佛豈復捨此而別有色身妙身耶須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來說諸相具足即非具足是名諸相具足以一色身不應見佛今就諸相得見不耶則一一相中同一色相故不應以此得見如來須菩提汝勿謂如來作是念我當有所說法莫作是念為衆生說如彼筏喻故如來無說法之念汝不應作是思惟何以故若人言如來有所說法即為謗佛不能解我所說故法無定法說豈說耶若人以我有法可說是人不解般若空義與我說法之謗爾須菩提說法者無法可說是名說法言者在意得意而忘言法者辨空悟空而無法空本無法故云無法可說了是義者得法甚深故云是名說法須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶前云無法可說善吉啓問欲明無法所由故云若無法可說者則佛於菩提無所得耶如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提於菩提中無有少法若有少法不名菩提為無法可得而能感而遂通故名菩提復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提於菩提道本無異門滅彼色空離於常斷一相無二是無為法適使萬殊咸其自己涅槃煩惱究竟無餘只於是中名菩提義以無我無人無衆生無壽者修一切善法則得阿耨多羅三藐三菩提無彼四相明已悟空習此中道云修善法不滯無有名得菩提須菩提所言善法者如來說非善法是名善法稱中道者因邊獲稱若存中法不異於邊故聖人說空以破於有故云善法有法既盡亦無空法故非善法能遣斯遣深入菩提是名善法須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若有人以此般若波羅蜜經乃至四句偈等受持為他人說於前福德百分不及一百千萬億分乃至算數譬喻所不能及如此校量前來已說於所明義一一不同前云是法平等不應經優而寶劣故重宣此義將遣是疑只為般若平等故勝如山之寶耳須菩提於意云何汝等勿謂如來作是念我當度衆生須菩提莫作是念如來無是念故汝莫作是思惟何以故實無有衆生如來度者衆生正性本來清淨六根起想煩惱病生觀生本空有何可度若有衆生如來度者如來則有我人衆生壽者般若中觀離諸名相若見衆生可度者則於法如中不了空義須菩提如來說有我者則非有我而凡夫之人以為有我前云我於然燈佛所則是說有我也然但曉凡順俗非係有我不同凡夫執著我相須菩提凡夫者如來說即非凡夫未達中道是名凡夫了般若空則證等覺故即非凡夫也須菩提於意云何可以三十二相觀如來不乘如正覺既非有我故不應以三十二相觀須菩提言如是如是以三十二相觀如來凡夫之人以相求佛佛言須菩提若以三十二相觀如來者轉輪聖王則是如來汝若以相見如來者轉輪聖王亦具是相則應是如來輪王既非如來故知如來不應以三十二相見須菩提白佛言世尊如我解佛所說義不應以三十二相觀如來善吉深達法性故不作凡夫解爾時世尊而說偈言此偈如頌非四句義若以色見我以聲音求我是人行邪道不能見如來無色見色不可以色見非聲應聲不可以聲求將令深趣涅槃必依聲色之外故以色聲求佛是人甚好徑焉得見如來須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提前破有相不見如來恐衆生即作無相求佛故此破云汝勿謂無相可得菩提菩提非有無故以有無求皆不得也論曰大聖說空法為破諸見故若復見有空諸佛所不化今者捨有而滯無亦由避溺而投火須菩提汝若作是念發阿耨多羅三藐三菩提者說諸法斷滅莫作是念汝若作無相而發道心者是斷一切行滅一切法不得中道也故莫作是念何以故發阿耨多羅三藐三菩提者於法不說斷滅相菩提中道不有不無若作有念者則墮於諸法常諸法實非常若作無念者則墮諸法斷諸法實非斷故於菩提中不得生有無見亦不得作常斷說須菩提若菩薩以滿恆河沙等世界七寶布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德離彼兩邊契於中道悟無生忍勝福甚多財施校量非所及也知無有我亦無無我遣之又遣深入菩提故知一切法無我也須菩提以諸菩薩不受福德故所勝前菩薩者悟無生忍無受福德處故也須菩提白佛言世尊云何菩薩不受福德發明前義而作是問須菩提菩薩所作福德不應貪著是故說不受福德貪著福德求受勝報未能無我不趣菩提如驪龍珠探必受害須菩提若有人言如來若來若去若坐若臥是人不解我所說義法身圓對有感即通明鏡鑒形無去來相若人於佛作此四儀當知是人不了深義何以故如來者無所從來亦無所去故名如來前云諸法如義者正所在皆如若有從來不名中道故無所從來亦無所去而無不去是以隨迎不得其先後名言究其去來故名如來其義如是須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆是為多不甚多世尊世界之數以為無量碎為微塵故知甚多何以故若是微塵衆實有者佛則不說是微塵衆於塵無自性亦合於相分如是假名者皆非實有法所以者何佛說微塵衆則非微塵衆是名微塵衆前云諸微塵如來說非微塵是名微塵引佛前說以證今說是知微塵無自性無自性故非微塵衆不壞伐法說微塵故是名微塵世尊如來所說三千大千世界則非世界是名世界聚塵界亦無性不應取世界之相何以故若世界實有者則是一合相不識無性以為實有者則是知一和合之相和合衆塵以成世界豈有定世界耶如來說一合相則非一合相是名一合相與世界同俱無性故須菩提一合相者則是不可說但凡夫之人貪著其事衆緣和合本無定相無所可說凡夫計有此相故貪著之須菩提若人言佛說我見人見衆生見壽者見須菩提於意云何是人解我所說義不世尊是人不解如來所說義佛說我見等將破衆生妄情著相爾而是人便以為佛有誠說是知不解如來所說義也何以故世尊說我見人見衆生見壽者見即非我見人見衆生見壽者見是名我見人見衆生見壽者見佛說四見以破妄情故所說我非人也而說法破妄必約俗諦是故須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相前來廣明中道空義故此勸云汝衆生若發菩提心者當依我所說如是知見信解不應於正觀中道而生法相須菩提所言法相者如來說即非法相是名法相菩提無定法豈有一法而有定相故說法相者令離於相於相無相是名法相須菩提若有人以滿無量阿僧祇世界七寶持用布施若有善男子善女人發菩薩心者持於此經乃至四句偈等受持讀誦為人演說其福勝彼前來校量皆以七寶布施不如持經功德今明所以勝彼謂如下文不取於相是福德性故也云何為人演說不取於相如如不動諸法性空假立名字假名之下無相可求故說法之人不應取相夢中占夢豈有相耶如義無相故無去來今說不取相則如彼如矣何以故一切有為法如夢幻泡影如露亦如電應作如是觀無為中道畢竟清淨說不取相則如彼如若一切法中作有為解如彼夢幻非究竟法作如是觀應不取相佛說是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所說皆大歡喜信受奉行聞甚歡喜奉右經開二十三乙亥之歲六月三日都釋門威儀僧思有表請至九月十五日經出合城具法儀於通洛門奉迎其日表賀便請頒示天下寫本入藏宣付史官其月十八日於敬愛寺設齊慶讚兼請中使王公宰相百開元草三年十月書手臣張若芳用小麻紙三十五張校書郎坦初校校書郎韓液再校正字李希言三校裝書匠臣陳善裝典書臣侯令惲典祕書郎臣盧倬掌朝散大夫守祕書監上柱國平鄉縣開國男臣宋升監正議大夫上柱國戴國公李道光祿大夫祕書監同正員上柱國汝陽郡王臣揔淳監天寶元年八月十五日立録文完方廣錩修改審定
